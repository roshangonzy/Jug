                { q: "Which drying agent is typically used to dry Ammonia gas?", options: ["Concentrated $\\ce{H2SO4}$", "Fused Calcium chloride", "Quicklime ($\\ce{CaO}$)", "Phosphorus pentoxide"], ans: 2, concept: "Drying Agents", diff: "H" },
                { q: "Why can't concentrated Sulphuric acid be used to dry Ammonia gas?", options: ["It is not a drying agent", "It chemically reacts with ammonia to form a salt", "Ammonia is a liquid", "It makes the ammonia explode"], ans: 1, concept: "Drying Agents", diff: "M" }
            ],
            test3: [
                // Focus: Hydrolysis, Mixed advanced, Amphoteric oxides
                { q: "A student tests a solution of Ammonium chloride ($\\ce{NH4Cl}$) and finds its pH is less than 7. This is because:", options: ["It is a salt of a strong acid and strong base", "It undergoes hydrolysis forming a strong acid ($\\ce{HCl}$) and weak base", "It is an acid salt", "It contains no water"], ans: 1, concept: "Salt Hydrolysis", diff: "H" },
                { q: "Which of the following salt solutions will turn phenolphthalein pink?", options: ["$\\ce{NaCl}$", "$\\ce{NH4NO3}$", "$\\ce{Na2CO3}$", "$\\ce{CuSO4}$"], ans: 2, concept: "Salt Hydrolysis", diff: "H" },
                { q: "An amphoteric oxide is one that:", options: ["Reacts only with acids", "Reacts only with strong alkalis", "Reacts with both acids and strong alkalis to form salt and water", "Does not react with anything"], ans: 2, concept: "Properties of Oxides", diff: "M" },
                { q: "Which of the following is a classic example of an amphoteric oxide?", options: ["$\\ce{Na2O}$", "$\\ce{CO2}$", "$\\ce{ZnO}$", "$\\ce{CaO}$"], ans: 2, concept: "Properties of Oxides", diff: "H" },
                { q: "Aluminium oxide ($\\ce{Al2O3}$) reacts with Sodium hydroxide to form:", options: ["Aluminium hydroxide", "Sodium aluminate and water", "Sodium aluminium oxide", "No reaction"], ans: 1, concept: "Amphoteric Oxides", diff: "H" },
                { q: "Which of the following metals forms an amphoteric oxide?", options: ["Iron", "Copper", "Lead", "Magnesium"], ans: 2, concept: "Properties of Oxides", diff: "H" },
                { q: "When a basic salt like Basic lead chloride ($\\ce{Pb(OH)Cl}$) is treated with dilute HCl, what is the final product?", options: ["$\\ce{PbCl2}$ + $\\ce{H2O}$", "$\\ce{PbO}$ + $\\ce{Cl2}$", "$\\ce{Pb(OH)2}$", "No reaction"], ans: 0, concept: "Basic Salts", diff: "H" },
                { q: "Which of the following pairs represents two strong acids?", options: ["Acetic acid and Nitric acid", "Sulphuric acid and Hydrochloric acid", "Carbonic acid and Phosphoric acid", "Formic acid and Citric acid"], ans: 1, concept: "Acid Strength", diff: "E" },
                { q: "Which acid is present in apples and lemons?", options: ["Lactic acid", "Malic/Citric acid", "Oxalic acid", "Formic acid"], ans: 1, concept: "Organic Acids", diff: "E" },
                { q: "A solution has a pOH of 3. What is its nature?", options: ["Strongly acidic", "Weakly acidic", "Neutral", "Strongly alkaline"], ans: 3, concept: "pH Scale Math", diff: "H" },
                { q: "If pH + pOH = 14, and a solution has a pH of 2, its hydroxyl ion concentration is:", options: ["Very high", "Equal to its hydrogen ion concentration", "Very low", "Zero"], ans: 2, concept: "pH Scale Math", diff: "M" },
                { q: "Which acid does NOT contain oxygen?", options: ["Nitric acid", "Sulphuric acid", "Hydrochloric acid", "Carbonic acid"], ans: 2, concept: "Hydracids vs Oxyacids", diff: "E" },
                { q: "Acids containing oxygen along with hydrogen and a non-metal are called:", options: ["Hydracids", "Oxyacids", "Binary acids", "Mineral acids"], ans: 1, concept: "Acid Classifications", diff: "M" },
                { q: "Which of the following is a completely anhydrous salt?", options: ["Blue vitriol", "Epsom salt", "Table salt ($\\ce{NaCl}$)", "Washing soda"], ans: 2, concept: "Water of Crystallization", diff: "M" },
                { q: "What is the action of heat on Copper(II) nitrate?", options: ["Melts cleanly", "Decrepitates with a crackling sound", "Decomposes to give a black residue ($\\ce{CuO}$), reddish-brown gas ($\\ce{NO2}$), and oxygen", "Sublimes"], ans: 2, concept: "Action of Heat", diff: "H" },
                { q: "What happens when Zinc carbonate is heated?", options: ["Turns yellow when hot, white when cold, releasing $\\ce{CO2}$", "Turns black", "Sublimes", "Melts into a clear liquid"], ans: 0, concept: "Action of Heat", diff: "H" },
                { q: "Which nitrate decomposes on heating to leave a yellow solid residue (when cold)?", options: ["Copper nitrate", "Lead nitrate", "Sodium nitrate", "Silver nitrate"], ans: 1, concept: "Action of Heat", diff: "H" },
                { q: "Heating Alkali metal nitrates (like $\\ce{NaNO3}$) generally yields:", options: ["The metal oxide + $\\ce{NO2}$ + $\\ce{O2}$", "The metal nitrite + $\\ce{O2}$", "The pure metal", "No reaction"], ans: 1, concept: "Action of Heat", diff: "H" },
                { q: "Which property allows concentrated Sulphuric acid to char sugar into a black spongy mass?", options: ["It is a strong acid", "It is an oxidizing agent", "It is a strong dehydrating agent", "It is hygroscopic"], ans: 2, concept: "Uses of Acids", diff: "M" },
                { q: "The reaction between a metal oxide and an acid is an example of:", options: ["Redox", "Neutralization", "Decomposition", "Synthesis"], ans: 1, concept: "Neutralization", diff: "M" },
                { q: "A metallic oxide that does NOT dissolve in water is:", options: ["$\\ce{Na2O}$", "$\\ce{K2O}$", "$\\ce{CaO}$", "$\\ce{CuO}$"], ans: 3, concept: "Alkalis", diff: "M" },
                { q: "Which of these is a mixed salt?", options: ["Bleaching powder ($\\ce{CaOCl2}$)", "Mohr's salt", "Potassium alum", "Sodium chloride"], ans: 0, concept: "Types of Salts", diff: "H" },
                { q: "A mixed salt contains:", options: ["Water of crystallization", "More than one basic or acidic radical", "Complex ions", "Only non-metals"], ans: 1, concept: "Types of Salts", diff: "H" },
                { q: "Which of the following is true for Pure Water at 25°C?", options: ["It has no ions", "Concentration of $\\ce{H+}$ is greater than $\\ce{OH-}$", "Concentration of $\\ce{H+}$ equals concentration of $\\ce{OH-}$", "It is a strong electrolyte"], ans: 2, concept: "pH Scale", diff: "E" },
                { q: "What is the pH of a 0.1 M solution of HCl?", options: ["0", "1", "2", "3"], ans: 1, concept: "pH Scale Math", diff: "H" },
                { q: "Which salt is used in the purification of water?", options: ["Sodium chloride", "Potash alum", "Baking soda", "Silver nitrate"], ans: 1, concept: "Uses of Salts", diff: "M" },
                { q: "When dilute HCl is added to a substance, brisk effervescence occurs and the gas extinguishes a burning splint. The substance is a:", options: ["Sulphide", "Sulphite", "Carbonate", "Nitrate"], ans: 2, concept: "Gas Tests", diff: "M" },
                { q: "What is the correct chemical name for 'Green Vitriol'?", options: ["Iron(II) sulphate heptahydrate", "Copper(II) sulphate pentahydrate", "Magnesium sulphate heptahydrate", "Zinc sulphate heptahydrate"], ans: 0, concept: "Common Names", diff: "M" },
                { q: "Which of these metals reacts with cold water to form an alkali and hydrogen gas?", options: ["Iron", "Copper", "Sodium", "Zinc"], ans: 2, concept: "Alkalis", diff: "M" },
                { q: "Which indicator remains colorless in an acidic solution?", options: ["Litmus", "Methyl orange", "Phenolphthalein", "Universal Indicator"], ans: 2, concept: "Indicators", diff: "E" },
                { q: "If an element forms an acidic oxide, the element is a:", options: ["Metal", "Non-metal", "Metalloid", "Noble gas"], ans: 1, concept: "Properties of Oxides", diff: "E" },
                { q: "Which of the following statements about bases is FALSE?", options: ["They have a bitter taste", "They feel soapy to touch", "They turn blue litmus red", "They neutralize acids"], ans: 2, concept: "Bases Definitions", diff: "E" },
                { q: "What is the basicity of Acetic Acid ($\\ce{CH3COOH}$)?", options: ["1", "2", "3", "4"], ans: 0, concept: "Basicity", diff: "M" },
                { q: "The presence of which ion causes a solution to turn red litmus blue?", options: ["$\\ce{H+}$", "$\\ce{OH-}$", "$\\ce{Na+}$", "$\\ce{Cl-}$"], ans: 1, concept: "Indicators", diff: "E" },
                { q: "Which of the following is NOT an application of neutralization?", options: ["Treating wasp stings with vinegar", "Treating indigestion with antacids", "Adding lime to acidic soil", "Brushing teeth with toothpaste"], ans: 0, concept: "Uses of Bases", diff: "M" },
                { q: "Wasp stings are alkaline. What should be used to treat them?", options: ["Baking soda", "Soap", "Vinegar", "Ammonia"], ans: 2, concept: "Uses of Acids", diff: "M" },
                { q: "What is the main component of antacids?", options: ["Strong acids", "Mild bases like Magnesium hydroxide", "Strong alkalis like Sodium hydroxide", "Neutral salts"], ans: 1, concept: "Uses of Bases", diff: "E" },
                { q: "Which gas is released when a metal reacts directly with an alkali?", options: ["Oxygen", "Carbon dioxide", "Hydrogen", "Nitrogen"], ans: 2, concept: "Properties of Alkalis", diff: "M" },
                { q: "Which of the following is a salt of a weak acid and a weak base?", options: ["$\\ce{NaCl}$", "$\\ce{CH3COONH4}$", "$\\ce{KNO3}$", "$\\ce{Na2SO4}$"], ans: 1, concept: "Salt Hydrolysis", diff: "H" },
                { q: "When identifying unknown salts, a white precipitate that turns black on adding $\\ce{H2S}$ gas indicates the presence of:", options: ["Zinc", "Lead", "Copper", "Iron"], ans: 1, concept: "Analytical Chemistry", diff: "H" }
            ]
        };

        let currentTestId = 'test1';
        let currentQuestions = [];
        let userAnswers = new Array(40).fill(null);

        function initApp() {
            // Setup Tab Listeners
            const tabs = document.querySelectorAll('.test-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    // Update UI tabs
                    tabs.forEach(t => {
                        t.classList.remove('active-tab', 'bg-slate-800', 'text-white', 'shadow-md');
                        t.classList.add('bg-white', 'text-slate-600');
                    });
                    const clickedTab = e.target;
                    clickedTab.classList.remove('bg-white', 'text-slate-600');
                    clickedTab.classList.add('active-tab', 'bg-slate-800', 'text-white', 'shadow-md');

                    // Load Test
                    currentTestId = clickedTab.getAttribute('data-target');
                    loadTest();
                });
            });

            // Load initial test
            loadTest();

            // Submit Button
            document.getElementById('submit-btn').addEventListener('click', evaluateTest);

            // Retry Button
            document.getElementById('retry-btn').addEventListener('click', () => {
                loadTest();
            });

            // Copy Report
            document.getElementById('copy-btn').addEventListener('click', () => {
                const reportText = document.getElementById('diagnostic-report-text');
                reportText.select();
                reportText.setSelectionRange(0, 99999); // For mobile devices
                try {
                    document.execCommand('copy');
                    const btn = document.getElementById('copy-btn');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<i class="ph-bold ph-check mr-1.5"></i> Copied!';
                    btn.classList.add('bg-emerald-600');
                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        btn.classList.remove('bg-emerald-600');
                    }, 2000);
                } catch (err) {
                    alert('Failed to copy. Please copy the text manually.');
                }
            });
        }

        function loadTest() {
            // Reset UI
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('report-container').classList.add('hidden');
            
            currentQuestions = quizData[currentTestId];
            userAnswers = new Array(currentQuestions.length).fill(null);
            
            let testName = currentTestId.replace('test', 'Test ');
            document.getElementById('test-title').innerText = testName;

            const form = document.getElementById('quiz-form');
            form.innerHTML = '';

            currentQuestions.forEach((qObj, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-slate-50 border border-slate-200 rounded-lg p-5 md:p-6 mb-6 relative';
                
                // Difficulty Badge
                let diffColor = 'bg-slate-200 text-slate-700';
                if(qObj.diff === 'E') diffColor = 'bg-emerald-100 text-emerald-800';
                if(qObj.diff === 'H') diffColor = 'bg-rose-100 text-rose-800';
                
                let optionsHTML = '';
                qObj.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <div class="relative flex items-start mt-3">
                            <input type="radio" name="q${index}" id="q${index}_opt${optIndex}" value="${optIndex}" class="peer sr-only radio-custom" onchange="recordAnswer(${index}, ${optIndex})">
                            <label for="q${index}_opt${optIndex}" class="flex items-center w-full p-3 border-2 border-slate-200 rounded-lg cursor-pointer transition-colors hover:bg-slate-100">
                                <div class="radio-circle w-5 h-5 rounded-full border-2 border-slate-300 mr-3 flex-shrink-0 transition-all"></div>
                                <span class="text-slate-700 font-medium">${opt}</span>
                            </label>
                        </div>
                    `;
                });

                qDiv.innerHTML = `
                    <div class="absolute top-4 right-4 text-[10px] font-bold px-2 py-1 rounded-sm uppercase tracking-widest ${diffColor}">
                        Diff: ${qObj.diff}
                    </div>
                    <div class="flex gap-4">
                        <div class="w-8 h-8 shrink-0 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold text-sm">
                            ${index + 1}
                        </div>
                        <div class="flex-grow">
                            <h3 class="text-lg font-bold text-slate-800 mb-2 pr-10">${qObj.q}</h3>
                            <div class="space-y-1 mt-4">
                                ${optionsHTML}
                            </div>
                        </div>
                    </div>
                `;
                form.appendChild(qDiv);
            });

            // Re-render KaTeX for injected math
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(form, {
                    delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}],
                    throwOnError: false
                });
            }
            
            window.scrollTo(0, 0);
        }

        window.recordAnswer = function(qIndex, optIndex) {
            userAnswers[qIndex] = optIndex;
        }

        function evaluateTest() {
            // Check if all answered
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if(!confirm(`You have ${unanswered} unanswered questions. Submit anyway?`)) return;
            }

            let score = 0;
            let totalMarks = currentQuestions.length; // 1 mark per question
            let reportLines = [];

            let testName = currentTestId.replace('test', 'Test ');
            reportLines.push(`Logic League Assessment Report`);
            reportLines.push(`Student: Sambhav (Retake Profile)`);
            reportLines.push(`Subject: Chemistry - Acids, Bases & Salts`);
            reportLines.push(`Assessment: ${testName}`);
            reportLines.push(`Date: ${new Date().toLocaleDateString()}`);
            reportLines.push(`\n--- DIAGNOSTIC ERROR LOG ---\n`);

            let errorsFound = 0;

            currentQuestions.forEach((qObj, index) => {
                const userAns = userAnswers[index];
                if (userAns === qObj.ans) {
                    score += 1;
                } else {
                    errorsFound++;
                    let userSelectionText = userAns === null ? "Left Blank" : qObj.options[userAns];
                    let correctSelectionText = qObj.options[qObj.ans];
                    
                    // Format for diagnostic prompt
                    reportLines.push(`Q${index + 1}: ${qObj.q}`);
                    reportLines.push(`Concept Tag: [${qObj.concept}] | Difficulty: [${qObj.diff}]`);
                    reportLines.push(`Student Answer: ${userSelectionText}`);
                    reportLines.push(`Correct Answer: ${correctSelectionText}`);
                    reportLines.push(`-----------------------------------`);
                }
            });

            if (errorsFound === 0) {
                reportLines.push(`Perfect Score! You have successfully mastered these concepts.`);
            }

            reportLines.unshift(`Score: ${score}/${totalMarks} (${((score/totalMarks)*100).toFixed(0)}%)\n`);

            reportLines.push(`\nLOGIC LEAGUE ANALYSIS REQUEST:`);
            reportLines.push(`You are an expert ICSE Chemistry tutor. Based on the specific 'Concept Tags' of the errors listed above, write a highly targeted, 3-point personalized learning plan for Sambhav focusing on his retake performance. Be extremely encouraging, explaining the 'why' behind the errors in ICSE terms.`);

            // Update UI
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('report-container').classList.remove('hidden');
            document.getElementById('score-display').innerText = `${score}/${totalMarks}`;
            
            const colorClass = score >= 32 ? 'text-emerald-600' : (score >= 20 ? 'text-amber-500' : 'text-rose-600');
            document.getElementById('score-display').className = `text-4xl font-extrabold mb-4 ${colorClass}`;

            document.getElementById('diagnostic-report-text').value = reportLines.join('\n');
            window.scrollTo(0, 0);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
